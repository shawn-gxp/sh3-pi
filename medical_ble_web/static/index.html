<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medical BLE Hub</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9bb4;
      --accent: #3d9cf0;
      --ok: #3ecf8e;
      --warn: #f0b429;
      --err: #f07178;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    header h1 { margin: 0; font-size: 1.25rem; font-weight: 600; }
    header .badge {
      font-size: 0.75rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      gap: 1.5rem;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem;
    }
    .card h2 {
      margin: 0 0 1rem;
      font-size: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: flex-end;
      margin-bottom: 1rem;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    select, input, button {
      font: inherit;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 0.5rem 0.75rem;
    }
    button {
      cursor: pointer;
      background: var(--accent);
      border-color: transparent;
      color: #fff;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button.secondary { background: transparent; border-color: var(--border); color: var(--text); }
    button.danger { background: var(--err); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Dashboard Grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .device-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: border-color 0.2s;
    }
    .device-card.highlight {
      border-color: var(--ok);
      box-shadow: 0 0 8px rgba(62, 207, 142, 0.2);
    }
    .device-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .device-name {
      font-weight: 600;
      font-size: 1.1rem;
      margin: 0;
    }
    .device-mac {
      font-family: monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .device-status {
      font-size: 0.75rem;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      background: var(--border);
    }
    .device-status.online { background: rgba(62, 207, 142, 0.2); color: var(--ok); }
    
    .vitals {
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px dashed var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .vital-item {
      display: flex;
      flex-direction: column;
    }
    .vital-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
    }
    .vital-value {
      font-size: 1.2rem;
      font-weight: bold;
    }
    .vital-value.spo2 { color: #5ec8ff; }
    .vital-value.pr { color: var(--ok); }
    .vital-value.pi { color: #82aaff; }
    .vital-value.pvi { color: #ffcb6b; }
    .vital-value.rrp { color: #c792ea; }
    .vital-value.bp { color: var(--err); }
    .vital-value.temp { color: #c792ea; }
    .vital-value.glucose { color: #ffcb6b; }
    .vital-unit {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 500;
    }
    .vital-time {
      grid-column: 1 / -1;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: right;
      margin-top: 0.25rem;
    }
    .vital-empty {
      grid-column: 1 / -1;
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
      padding: 0.5rem 0;
    }

    /* Daemon Status Bar */
    .daemon-bar {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
    }
    .daemon-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--err);
    }
    .daemon-indicator.active {
      background: var(--ok);
      box-shadow: 0 0 5px var(--ok);
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      text-align: left;
      padding: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    th { color: var(--muted); font-weight: 500; }
    
    .log-box {
      font-family: monospace;
      font-size: 0.85rem;
      background: var(--bg);
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <h1>Medical BLE Hub</h1>
    <div style="display: flex; gap: 0.5rem;">
      <span class="badge" id="mqttBadge">MQTT: checking...</span>
      <span class="badge" id="wsBadge">WS: connecting...</span>
    </div>
  </header>

  <main>
    <!-- Daemon Status -->
    <section class="card">
      <h2>Hub Daemon Status</h2>
      <div class="daemon-bar">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <span class="daemon-indicator" id="daemonLed"></span>
          <strong id="daemonState">Stopped</strong>
        </div>
        <div>Scan Round: <span id="daemonRound">-</span></div>
        <div>Last Device: <span id="daemonLastDevice">-</span></div>
        <div style="margin-left: auto;">
          <button id="btnDaemonStart" class="secondary" onclick="startDaemon()">Start</button>
          <button id="btnDaemonStop" class="secondary hidden" onclick="stopDaemon()">Stop</button>
        </div>
      </div>
    </section>

    <!-- Dashboard -->
    <section class="card">
      <h2>Paired Devices Dashboard</h2>
      <div id="dashboardGrid" class="dashboard-grid">
        <div style="color: var(--muted); padding: 1rem;">Loading devices...</div>
      </div>
    </section>

    <!-- Pairing Section -->
    <section class="card">
      <h2>Add / Re-pair Device</h2>
      <div class="row">
        <button id="btnScan" onclick="startScan()">1. Scan for Devices</button>
        <span id="scanStatus" style="font-size: 0.9rem; color: var(--muted);"></span>
      </div>
      
      <div id="scanResults" class="hidden" style="margin-bottom: 1rem;">
        <table id="scanTable">
          <thead><tr><th>MAC Address</th><th>Name</th><th>RSSI</th><th>Action</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div id="pairForm" class="hidden" style="background: var(--bg); padding: 1rem; border-radius: 8px; border: 1px solid var(--border);">
        <h3 style="margin-top: 0;">2. Pair Selected Device</h3>
        <div class="row">
          <label>MAC Address <input type="text" id="pairMac" readonly /></label>
          <label>Brand
            <select id="pairBrand">
              <option value="omron">Omron (BP)</option>
              <option value="nipro_nbp">Nipro NBP (BP)</option>
              <option value="nipro_nt100b">Nipro NT-100B (Temp)</option>
              <option value="mightysat">Masimo MightySat (SpO2)</option>
            </select>
          </label>
          <label><br><button onclick="executePair()">Pair Device</button></label>
        </div>
        <div id="pairLog" class="log-box hidden"></div>
      </div>
    </section>

    <!-- Settings & Admin -->
    <section class="card">
      <h2>Settings & Admin</h2>
      <div class="row">
        <label>Patient ID
          <div style="display: flex; gap: 0.5rem;">
            <input type="text" id="patientId" placeholder="e.g. PAT-123" />
            <button class="secondary" onclick="savePatientId()">Save</button>
          </div>
        </label>
        <div style="margin-left: auto;">
          <button class="danger" onclick="factoryReset()">Factory Reset Hub</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    let ws = null;

    async function init() {
      await updateHealth();
      await fetchPatientId();
      connectWS();
    }

    async function updateHealth() {
      try {
        const res = await fetch('/health');
        const data = await res.json();
        const mqtt = data.mqtt || {};
        const b = document.getElementById('mqttBadge');
        if (mqtt.connected) {
          b.innerText = `MQTT: Online`;
          b.style.color = 'var(--ok)';
          b.style.borderColor = 'var(--ok)';
        } else {
          b.innerText = `MQTT: Offline`;
          b.style.color = 'var(--err)';
          b.style.borderColor = 'var(--err)';
        }
        updateDaemonUI(data.daemon);
      } catch (e) {
        console.warn('Health check failed', e);
      }
    }

    function updateDaemonUI(daemon) {
      if (!daemon) return;
      const led = document.getElementById('daemonLed');
      const state = document.getElementById('daemonState');
      const btnStart = document.getElementById('btnDaemonStart');
      const btnStop = document.getElementById('btnDaemonStop');
      
      if (daemon.active) {
        led.classList.add('active');
        state.innerText = 'Running';
        state.style.color = 'var(--ok)';
        btnStart.classList.add('hidden');
        btnStop.classList.remove('hidden');
      } else {
        led.classList.remove('active');
        state.innerText = 'Stopped';
        state.style.color = 'var(--muted)';
        btnStart.classList.remove('hidden');
        btnStop.classList.add('hidden');
      }
      
      document.getElementById('daemonRound').innerText = daemon.scan_rounds || '0';
      document.getElementById('daemonLastDevice').innerText = daemon.last_mac || '-';
    }

    function fmtNum(v, digits) {
      if (v === null || v === undefined || v === '') return '—';
      const n = Number(v);
      if (!Number.isFinite(n)) return String(v);
      return digits != null ? n.toFixed(digits) : String(n);
    }

    function hasVal(v) {
      return v !== null && v !== undefined && v !== '';
    }

    function renderDashboard(board, highlightMac = '') {
      const grid = document.getElementById('dashboardGrid');
      if (!board || board.length === 0) {
        grid.innerHTML = '<div style="color: var(--muted); padding: 1rem;">No devices paired. Use the scan tool below to add one.</div>';
        return;
      }
      
      grid.innerHTML = board.map(device => {
        const mac = (device.mac || '').toUpperCase();
        const isHighlight = mac && mac === (highlightMac || '').toUpperCase() ? 'highlight' : '';
        const isOnline = device.online ? 'online' : '';
        const statusText = device.online ? 'Online' : 'Offline';
        const title = device.name || device.model || device.brand || 'Device';
        
        let vitalsHtml = '<div class="vital-empty">No readings yet</div>';
        if (device.vitals) {
          const v = device.vitals;
          const parts = [];
          // BP: sys/dia (+ pulse on same card below)
          if (hasVal(v.systolic) && hasVal(v.diastolic)) {
            parts.push(`<div class="vital-item"><span class="vital-label">BP</span><span class="vital-value bp">${fmtNum(v.systolic)}/${fmtNum(v.diastolic)}</span><span class="vital-unit">mmHg</span></div>`);
          }
          // Masimo / SpO2 full set (old UI: SpO2 + PR + PI; plus PVI + RRp when present)
          if (hasVal(v.spo2)) {
            parts.push(`<div class="vital-item"><span class="vital-label">SpO2</span><span class="vital-value spo2">${fmtNum(v.spo2)}</span><span class="vital-unit">%</span></div>`);
          }
          if (hasVal(v.pulse_rate)) {
            parts.push(`<div class="vital-item"><span class="vital-label">Pulse</span><span class="vital-value pr">${fmtNum(v.pulse_rate)}</span><span class="vital-unit">bpm</span></div>`);
          }
          if (hasVal(v.perfusion_index)) {
            parts.push(`<div class="vital-item"><span class="vital-label">PI</span><span class="vital-value pi">${fmtNum(v.perfusion_index, 2)}</span><span class="vital-unit">perfusion</span></div>`);
          }
          if (hasVal(v.pvi)) {
            parts.push(`<div class="vital-item"><span class="vital-label">PVI</span><span class="vital-value pvi">${fmtNum(v.pvi)}</span><span class="vital-unit">%</span></div>`);
          }
          if (hasVal(v.rrp)) {
            parts.push(`<div class="vital-item"><span class="vital-label">RRp</span><span class="vital-value rrp">${fmtNum(v.rrp)}</span><span class="vital-unit">/min</span></div>`);
          }
          if (hasVal(v.temperature)) {
            parts.push(`<div class="vital-item"><span class="vital-label">Temp</span><span class="vital-value temp">${fmtNum(v.temperature, 1)}</span><span class="vital-unit">°C</span></div>`);
          }
          if (hasVal(v.glucose_mg_dl)) {
            parts.push(`<div class="vital-item"><span class="vital-label">Glucose</span><span class="vital-value glucose">${fmtNum(v.glucose_mg_dl)}</span><span class="vital-unit">mg/dL</span></div>`);
          }
          const timeStr = v.measured_at ? new Date(v.measured_at).toLocaleString() : '';
          if (timeStr) {
            parts.push(`<div class="vital-time">Last updated: ${timeStr}</div>`);
          }
          if (parts.length) vitalsHtml = parts.join('');
        }

        return `
          <div class="device-card ${isHighlight}">
            <div class="device-header">
              <div>
                <h3 class="device-name">${title}</h3>
                <div class="device-mac">${device.brand || ''} · ${mac}</div>
              </div>
              <span class="device-status ${isOnline}">${statusText}</span>
            </div>
            <div class="vitals">${vitalsHtml}</div>
          </div>
        `;
      }).join('');
    }

    function connectWS() {
      const wsUrl = `ws://${location.host}/ws/live`;
      ws = new WebSocket(wsUrl);
      const b = document.getElementById('wsBadge');
      
      ws.onopen = () => {
        b.innerText = 'WS: Connected';
        b.style.color = 'var(--ok)';
        b.style.borderColor = 'var(--ok)';
      };
      
      ws.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.daemon) updateDaemonUI(msg.daemon);
        if (msg.dashboard) {
          const h = (msg.live && msg.live.mac) ? msg.live.mac : '';
          renderDashboard(msg.dashboard.board, h);
        }
      };
      
      ws.onclose = () => {
        b.innerText = 'WS: Disconnected';
        b.style.color = 'var(--err)';
        b.style.borderColor = 'var(--err)';
        setTimeout(connectWS, 3000);
      };
    }

    // --- API Calls ---

    async function startDaemon() {
      await fetch('/daemon/start', { method: 'POST' });
      updateHealth();
    }
    
    async function stopDaemon() {
      await fetch('/daemon/stop', { method: 'POST' });
      updateHealth();
    }

    async function startScan() {
      const btn = document.getElementById('btnScan');
      const st = document.getElementById('scanStatus');
      const timeoutSec = 8;
      btn.disabled = true;
      document.getElementById('scanResults').classList.add('hidden');

      let left = timeoutSec;
      const setScanLabel = () => {
        st.innerText = left > 0
          ? `Scanning… ${left}s remaining`
          : 'Still scanning…';
      };
      setScanLabel();
      const timer = setInterval(() => {
        left -= 1;
        setScanLabel();
      }, 1000);

      try {
        const res = await fetch('/scan', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ timeout: timeoutSec })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail?.error || 'Scan failed');

        st.innerText = `Found ${data.count} devices.`;
        if (data.count > 0) {
          const tbody = document.querySelector('#scanTable tbody');
          tbody.innerHTML = data.devices.map(d => {
            const mac = d.mac || d.address || '';
            const rssi = (d.rssi === null || d.rssi === undefined) ? '—' : `${d.rssi} dBm`;
            const name = (d.name || '-').replace(/</g, '&lt;');
            return `
            <tr>
              <td style="font-family:monospace">${mac}</td>
              <td>${name}</td>
              <td>${rssi}</td>
              <td><button class="secondary" onclick="selectForPair('${mac}')">Select</button></td>
            </tr>`;
          }).join('');
          document.getElementById('scanResults').classList.remove('hidden');
        }
      } catch (e) {
        st.innerText = e.message;
      } finally {
        clearInterval(timer);
        btn.disabled = false;
      }
    }

    function selectForPair(mac) {
      document.getElementById('pairMac').value = mac;
      document.getElementById('pairForm').classList.remove('hidden');
      document.getElementById('pairLog').classList.add('hidden');
    }

    async function executePair() {
      const mac = document.getElementById('pairMac').value;
      const brand = document.getElementById('pairBrand').value;
      const logBox = document.getElementById('pairLog');
      
      logBox.classList.remove('hidden');
      logBox.innerText = `Pairing ${brand} at ${mac}...\n(Make sure device is awake and in range)`;
      
      try {
        const res = await fetch('/pair', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ mac, brand, repair: true })
        });
        const data = await res.json();
        if (!res.ok) {
          const d = data.detail;
          const msg = (d && d.error) || (typeof d === 'string' ? d : null)
            || data.error || 'Pair failed';
          throw new Error(msg);
        }
        
        logBox.innerText += `\nSuccess! Bonded and registered. Daemon will now auto-collect.`;
        updateHealth();
      } catch (e) {
        logBox.innerText += `\nError: ${e.message}`;
      }
    }

    async function fetchPatientId() {
      try {
        const res = await fetch('/settings/patient');
        const data = await res.json();
        document.getElementById('patientId').value = data.patient_id || '';
      } catch (e) {}
    }

    async function savePatientId() {
      const pid = document.getElementById('patientId').value;
      try {
        await fetch('/settings/patient', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ patient_id: pid })
        });
        alert('Patient ID saved.');
      } catch (e) {
        alert('Failed to save Patient ID.');
      }
    }

    async function factoryReset() {
      if (!confirm("Wipe all paired devices and databases? (OS bonds remain)")) return;
      try {
        const res = await fetch('/admin/reset', { method: 'POST' });
        const data = await res.json();
        alert(data.message);
        location.reload();
      } catch (e) {
        alert('Reset failed.');
      }
    }

    init();
  </script>
</body>
</html>
